<!DOCTYPE html>
<html lang="ko">
<head>

<meta charset="UTF-8">
<title>AIDT 사용량 대시보드</title>

<link rel="stylesheet" href="aidt-design-system.css">

<style>

body{
font-family: Pretendard, sans-serif;
padding:40px;
background:#f7f7f7;
}

h1{
margin-bottom:20px;
}

textarea{
width:100%;
height:200px;
padding:12px;
font-size:14px;
}

button{
padding:10px 16px;
margin-top:10px;
margin-right:8px;
cursor:pointer;
}

.card{
background:white;
padding:20px;
margin-top:24px;
border-radius:10px;
box-shadow:0 2px 8px rgba(0,0,0,0.05);
}

table{
width:100%;
border-collapse:collapse;
margin-top:10px;
}

th,td{
border-bottom:1px solid #eee;
padding:8px;
text-align:center;
font-size:14px;
}

th{
background:#fafafa;
}

.filter-row{
margin-bottom:10px;
}

select,input{
padding:6px;
margin-right:10px;
}

canvas{
margin-top:20px;
}

.total-cards{
display:flex;
gap:16px;
margin-bottom:20px;
}

.stat{
flex:1;
text-align:center;
}

.stat div{
font-size:28px;
font-weight:700;
margin-top:6px;
}

.card-header{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:10px;
}

.tooltip{
position:relative;
cursor:pointer;
font-size:12px;
color:#888;
margin-left:4px;
}

.tooltiptext{
visibility:hidden;
width:180px;
background:#333;
color:#fff;
text-align:left;
padding:6px;
border-radius:4px;
position:absolute;
bottom:120%;
left:50%;
transform:translateX(-50%);
font-size:12px;
z-index:1;
}

.tooltip:hover .tooltiptext{
visibility:visible;
}

/* ===== 버튼 공통 ===== */

button{
border:none;
border-radius:8px;
font-weight:600;
transition:all 0.2s ease;
}

/* ===== Primary 버튼 (데이터 추가) ===== */

.btn-primary{
background:#2563eb;
color:white;
padding:10px 18px;
}

.btn-primary:hover{
background:#1e4fd6;
transform:translateY(-1px);
box-shadow:0 4px 10px rgba(0,0,0,0.1);
}

/* ===== Secondary 버튼 (CSV) ===== */

.btn-secondary{
background:#f3f4f6;
color:#333;
padding:8px 14px;
}

.btn-secondary:hover{
background:#e5e7eb;
}

/* ===== 필터 버튼 ===== */

.btn-filter{
background:#10b981;
color:white;
padding:8px 14px;
}

.btn-filter:hover{
background:#059669;
}

/* ===== 페이지네이션 ===== */

#pagination{
margin-top:20px;
text-align:center;
}

/* 페이지 버튼 */

.page-btn{
background:white;
border:1px solid #ddd;
padding:6px 10px;
margin:2px;
border-radius:6px;
font-size:13px;
cursor:pointer;
}

.page-btn:hover{
background:#f3f4f6;
}

/* 현재 페이지 */

.page-btn.active{
background:#2563eb;
color:white;
border-color:#2563eb;
}

/* 좌우 이동 버튼 */

.page-nav{
background:#f3f4f6;
border:1px solid #ddd;
padding:6px 10px;
margin:2px;
border-radius:6px;
font-size:13px;
cursor:pointer;
}

.page-nav:hover{
background:#e5e7eb;
}

.sort-header{
display:flex;
align-items:center;
justify-content:center;
gap:6px;
}

.sort-icons{
display:flex;
flex-direction:column;
font-size:10px;
line-height:10px;
cursor:pointer;
}

.sort-icons span{
color:#bbb;
}

.sort-icons span.active{
color:#2563eb;
font-weight:700;
}
</style>

</head>


<body>

<h1>📊 AIDT 사용량 대시보드</h1>

<div class="total-cards">

<div class="card stat">
<h3>학교</h3>
<div id="totalSchool">0</div>
</div>

<div class="card stat">
<h3>교사수업</h3>
<div id="totalTeacherClass">0</div>
</div>

<div class="card stat">
<h3>학생입장</h3>
<div id="totalStudentJoin">0</div>
</div>

<div class="card stat">
<h3>교사로그인</h3>
<div id="totalTeacherLogin">0</div>
</div>

<div class="card stat">
<h3>학생로그인</h3>
<div id="totalStudentLogin">0</div>
</div>

</div>

<div class="card">

<h3>Teams 메시지 붙여넣기</h3>

<textarea id="input"></textarea>

<br>

<button class="btn-primary" onclick="addData()">데이터 추가</button>

</div>



<div class="card">

<div class="card-header">

<h3>📅 누적 사용량 데이터</h3>

<button class="btn-secondary" onclick="downloadCSV()">CSV 다운로드</button>

</div>

<div class="filter-row">

<select id="dateType" onchange="toggleDatePicker()">
<option value="day">일</option>
<option value="week">주</option>
<option value="month">월</option>
</select>

<input type="date" id="dayPicker">

<input type="week" id="weekPicker" style="display:none">

<input type="month" id="monthPicker" style="display:none">

교과서
<select id="bookFilter">
<option value="">전체</option>
</select>

<button class="btn-filter" onclick="currentPage=1; render()">필터 적용</button>

</div>

<table id="dataTable">

<thead>
<tr>
<th>
<div class="sort-header">
날짜
<div class="sort-icons">
<span id="dateAsc" onclick="setSort('date','asc')">▲</span>
<span id="dateDesc" onclick="setSort('date','desc')">▼</span>
</div>
</div>
</th>
<th onclick="setSort('book')">교과서</th>
<th onclick="setSort('school')">학교</th>
<th onclick="setSort('teacherClass')">
교사 수업
<span class="tooltip">ⓘ
<span class="tooltiptext">
교사가 실제 수업 시작 버튼을 눌러 생성된 수업 수
</span>
</span>
</th>
<th onclick="setSort('studentJoin')">
학생 입장
<span class="tooltip">ⓘ
<span class="tooltiptext">
학생이 수업에 실제 입장한 횟수
</span>
</span>
</th>
<th onclick="setSort('teacherLogin')">
교사 로그인
<span class="tooltip">ⓘ
<span class="tooltiptext">
로그인한 교사 수 (중복 제거)
</span>
</span>
</th>
<th onclick="setSort('studentLogin')">
학생 로그인
<span class="tooltip">ⓘ
<span class="tooltiptext">
로그인한 학생 수 (중복 제거)
</span>
</span>
</th>
</tr>
</thead>

<tbody></tbody>

</table>
<div id="pagination" style="margin-top:10px;text-align:center;"></div>
</div>



<div class="card">

<h3>📈 사용량 추이</h3>

<canvas id="loginChart" height="100"></canvas>

</div>


<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<script>

let storageKey="aidt_usage_data"
let currentPage=1
let rowsPerPage=10
let sortColumn="date"
let sortDirection="desc"


function addData(){

let text=document.getElementById("input").value

let dateMatch=text.match(/\d{4}년\s\d{2}월\s\d{2}일/)

if(!dateMatch){
alert("날짜 인식 실패")
return
}

let date=dateMatch[0]
.replace("년","-")
.replace("월","-")
.replace("일","")

let lines=text.split("\n").map(v=>v.trim()).filter(v=>v!="")

let saved=JSON.parse(localStorage.getItem(storageKey)||"[]")

for(let i=0;i<lines.length;i++){

if(lines[i].includes("[") && !isNaN(lines[i+1])){

saved.unshift({

date:date,
book:lines[i],
school:Number(lines[i+1]),
teacherClass:Number(lines[i+2]),
studentJoin:Number(lines[i+3]),
teacherLogin:Number(lines[i+4]),
studentLogin:Number(lines[i+5])

})

}

}

localStorage.setItem(storageKey,JSON.stringify(saved))

document.getElementById("input").value=""

render()

}



function getFilteredData(){

let saved=JSON.parse(localStorage.getItem(storageKey)||"[]")

let day=document.getElementById("dayPicker").value
let week=document.getElementById("weekPicker").value
let month=document.getElementById("monthPicker").value
let book=document.getElementById("bookFilter").value

return saved.filter(d=>{

let dDate=new Date(d.date)

if(day){

if(d.date!=day) return false

}

if(week){

let [year,weekNum]=week.split("-W")

let firstDay=new Date(year,0,1)

let weekStart=new Date(firstDay.getTime()+(weekNum-1)*7*86400000)

let weekEnd=new Date(weekStart.getTime()+6*86400000)

if(dDate < weekStart || dDate > weekEnd) return false

}

if(month){

let [year,monthNum]=month.split("-")

if(
dDate.getFullYear()!=year ||
(dDate.getMonth()+1)!=monthNum
) return false

}

if(book && d.book!=book) return false

return true

})

}



function render(){

let data=sortData(getFilteredData())

let tbody=document.querySelector("#dataTable tbody")

tbody.innerHTML=""

let start=(currentPage-1)*rowsPerPage
let end=start+rowsPerPage

let pageData=data.slice(start,end)

if(pageData.length===0){

tbody.innerHTML=`
<tr>
<td colspan="7" style="padding:40px;text-align:center;color:#888;">
위의 'Teams 메시지 붙여넣기'에서 데이터를 추가해주세요.
</td>
</tr>
`

}else{

pageData.forEach(d=>{

tbody.innerHTML+=`
<tr>
<td>${d.date}</td>
<td>${d.book}</td>
<td>${d.school}</td>
<td>${d.teacherClass}</td>
<td>${d.studentJoin}</td>
<td>${d.teacherLogin}</td>
<td>${d.studentLogin}</td>
</tr>
`

})

}

renderFilters()
renderTotalCards()
renderChart()
renderPagination(data.length)
updateSortIcons()

}



function renderFilters(){

let saved=JSON.parse(localStorage.getItem(storageKey)||"[]")

let books=[...new Set(saved.map(v=>v.book))]
.sort()

let select=document.getElementById("bookFilter")

let current=select.value

select.innerHTML=`<option value="">전체</option>`

books.forEach(b=>{
select.innerHTML+=`<option value="${b}">${b}</option>`
})

select.value=current

}



function renderChart(){

let data=sortData(getFilteredData())

let map={}

data.forEach(d=>{

if(!map[d.date]){
map[d.date]={
teacherClass:0,
studentJoin:0,
teacherLogin:0,
studentLogin:0
}
}

map[d.date].teacherClass+=d.teacherClass
map[d.date].studentJoin+=d.studentJoin
map[d.date].teacherLogin+=d.teacherLogin
map[d.date].studentLogin+=d.studentLogin

})

let labels=Object.keys(map).sort()

let teacherClass=labels.map(v=>map[v].teacherClass)
let studentJoin=labels.map(v=>map[v].studentJoin)
let teacherLogin=labels.map(v=>map[v].teacherLogin)
let studentLogin=labels.map(v=>map[v].studentLogin)

let ctx=document.getElementById("loginChart")

if(window.chart) window.chart.destroy()

window.chart=new Chart(ctx,{
type:"line",
data:{
labels:labels,
datasets:[
{label:"교사수업",data:teacherClass},
{label:"학생입장",data:studentJoin},
{label:"교사로그인",data:teacherLogin},
{label:"학생로그인",data:studentLogin}
]
}
})

}


function renderTotalCards(){

let data=sortData(getFilteredData())

let total={
school:0,
teacherClass:0,
studentJoin:0,
teacherLogin:0,
studentLogin:0
}

data.forEach(d=>{

total.school+=d.school
total.teacherClass+=d.teacherClass
total.studentJoin+=d.studentJoin
total.teacherLogin+=d.teacherLogin
total.studentLogin+=d.studentLogin

})

document.getElementById("totalSchool").innerText=total.school
document.getElementById("totalTeacherClass").innerText=total.teacherClass
document.getElementById("totalStudentJoin").innerText=total.studentJoin
document.getElementById("totalTeacherLogin").innerText=total.teacherLogin
document.getElementById("totalStudentLogin").innerText=total.studentLogin

}

function downloadCSV(){

let data=sortData(getFilteredData())

let csv="date,book,school,teacherClass,studentJoin,teacherLogin,studentLogin\n"

data.forEach(d=>{

csv+=`${d.date},${d.book},${d.school},${d.teacherClass},${d.studentJoin},${d.teacherLogin},${d.studentLogin}\n`

})

let blob=new Blob([csv])

let a=document.createElement("a")

a.href=URL.createObjectURL(blob)

a.download="aidt_usage.csv"

a.click()

}



render()

function renderPagination(total){

let pageCount=Math.max(1,Math.ceil(total/rowsPerPage))

let container=document.getElementById("pagination")

container.innerHTML=""

let pageGroup=Math.ceil(currentPage/10)

let startPage=(pageGroup-1)*10+1
let endPage=Math.min(startPage+9,pageCount)


if(pageCount>10){

container.innerHTML+=`
<button class="page-nav" onclick="prevPage()" ${startPage===1?'disabled':''}>◀</button>
`

}


for(let i=startPage;i<=endPage;i++){

container.innerHTML+=`
<button class="page-btn ${i===currentPage?'active':''}" onclick="changePage(${i})" ${i===currentPage?'style="font-weight:bold;"':''}>
${i}
</button>
`

}


if(pageCount>10){

container.innerHTML+=`
<button class="page-nav" onclick="nextPage()">▶</button>
`

}

}

function changePage(page){

currentPage=page

render()

}

function sortData(data){

return data.sort((a,b)=>{

let v1=a[sortColumn]
let v2=b[sortColumn]

if(typeof v1==="string"){

return sortDirection==="asc"
? v1.localeCompare(v2)
: v2.localeCompare(v1)

}

return sortDirection==="asc"
? v1-v2
: v2-v1

})

}

function setSort(column,direction){

sortColumn=column
sortDirection=direction

updateSortIcons()

render()

}

function toggleDatePicker(){

let type=document.getElementById("dateType").value

document.getElementById("dayPicker").style.display="none"
document.getElementById("weekPicker").style.display="none"
document.getElementById("monthPicker").style.display="none"

if(type=="day") document.getElementById("dayPicker").style.display="inline"
if(type=="week") document.getElementById("weekPicker").style.display="inline"
if(type=="month") document.getElementById("monthPicker").style.display="inline"

}

function prevPage(){

let pageGroup=Math.ceil(currentPage/10)

let target=(pageGroup-2)*10+1

if(target<1) target=1

currentPage=target

render()

}

function nextPage(){

let pageGroup=Math.ceil(currentPage/10)

let target=pageGroup*10+1

currentPage=target

render()

}

function updateSortIcons(){

document.getElementById("dateAsc").classList.remove("active")
document.getElementById("dateDesc").classList.remove("active")

if(sortDirection==="asc"){
document.getElementById("dateAsc").classList.add("active")
}

if(sortDirection==="desc"){
document.getElementById("dateDesc").classList.add("active")
}

}
</script>

</body>
</html>
